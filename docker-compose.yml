version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digital_personality}
      POSTGRES_USER: ${POSTGRES_USER:-dp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dp_secret}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dp_user} -d ${POSTGRES_DB:-digital_personality}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dp_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dp_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - session_data:/data/sessions
    networks:
      - dp_network

volumes:
  postgres_data:
    driver: local
  session_data:
    driver: local

networks:
  dp_network:
    driver: bridge
